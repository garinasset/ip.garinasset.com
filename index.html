<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>IP 查询工具</title>
    <meta name="description" content="IP 查询工具，可快速获取 IP 地址的地理位置、国家、城市、经纬度、ASN 和 ASO 信息, GARINASSET 。">
    <meta name="keywords"
        content="ip, asn, geolocation, lookup, 地理信息, 位置信息, 免费 ip 查询, IP 查询, IP 地址, ASN, ASO, 国家, 城市, 经纬度, GARINASSET">
    <meta name="author" content="GARINASSET">
    <meta name="robots" content="index, follow">
    <style>
        /* 页面容器和基础布局 */
        body,
        .page-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            font-size: 1em;
            line-height: 1.5em;
        }

        .main-content-wrapper {
            flex-shrink: 0;
            box-sizing: border-box;
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 5.75em;
            padding-top: 3.75em;
        }

        .logo-image {
            max-width: 16em;
            object-fit: contain;
            max-height: 16em;
        }

        @media (max-width: 600px) {
            .logo-image {
                max-width: 7em;
                max-height: 7em;
            }
        }

        .search-container {
            padding: 1.25em 1em;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .search-form {
            width: 100%;
        }

        .search-form-wrapper {
            margin: 0 auto;
            max-width: 43em;
            padding-top: 0.375em;
            position: relative;
            width: 100%;
        }

        .search-box-container {
            display: flex;
            z-index: 3;
            position: relative;
            min-height: 3.125em;
            background: #fff;
            border: 0.0625em solid #dadce0;
            box-shadow: 0px 0.1875em 0.625em 0px rgba(31, 31, 31, 0.08);
            border-radius: 1.625em;
            margin: 0 auto;
            width: 100%;
        }

        .search-inner {
            flex: 1;
            display: flex;
            align-items: center;
            background: inherit;
            border-radius: inherit;
            padding: 0 0.5em 0 0;
        }

        .search-icon-wrapper {
            display: flex;
            align-items: center;
            padding-right: 0.8125em;
            padding-left: 0.875em;
            margin-top: 0;
            height: 3.125em;
        }

        .search-icon-container {
            margin: auto;
        }

        .search-icon {
            color: #bdc1c6;
            display: flex;
            align-items: center;
            height: 1.25em;
            line-height: 1.25em;
            width: 1.25em;
        }

        .search-icon svg path {
            fill: currentColor;
        }

        .search-input {
            width: 100%;
            resize: none;
            background-color: transparent;
            border: none;
            margin: 0;
            padding: 0;
            color: rgba(0, 0, 0, .87);
            word-wrap: break-word;
            outline: none;
            font: 1em Arial, sans-serif;
            flex: 100%;
            height: 3.125em;
            line-height: 1.5em;
        }

        .search-input::placeholder {
            color: #9aa0a6;
        }

        .search-box-container.error {
            border: 0.0625em solid #d93025;
            box-shadow: 0 0 0.25em rgba(217, 48, 37, 0.6);
        }

        .shake {
            animation: shake 0.35s ease;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-4px);
            }

            40% {
                transform: translateX(4px);
            }

            60% {
                transform: translateX(-3px);
            }

            80% {
                transform: translateX(3px);
            }

            100% {
                transform: translateX(0);
            }
        }

        .buttons-area {
            height: 4.375em;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            max-width: 43em;
            margin: 0 auto;
        }

        .search-button {
            background-color: #f8f9fa;
            border: 0.0625em solid #f8f9fa;
            border-radius: 0.5em;
            color: #3c4043;
            font-family: Arial, sans-serif;
            font-size: 0.875em;
            font-weight: 500;
            margin: 0.6875em 0.25em;
            padding: 0 1em;
            height: 2.25em;
            min-width: 3.375em;
            text-align: center;
            cursor: pointer;
            user-select: none;
            transition: box-shadow 0.2s ease, border-color 0.2s ease, color 0.2s ease;
            flex-shrink: 0;
        }

        .search-button:hover {
            box-shadow: 0 0.0625em 0.0625em rgba(0, 0, 0, .1);
            background-color: #f8f9fa;
            border: 0.0625em solid #dadce0;
            color: #202124;
        }

        .search-button:focus {
            border: 0.0625em solid #4285f4;
            outline: none;
        }

        .ip-area,
        .geolocation-area,
        .aso-area,
        .client-area {
            flex: 1;
            text-align: center;
            padding: 0.625em 1em;
        }

        .body-content,
        .footer-content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            max-width: 43em;
            margin: 0 auto;
            text-align: center;
        }

        .body-text,
        .footer-text {
            color: rgb(0, 0, 153);
            display: inline-block;
            font-size: 0.75em;
            line-height: 1.125em;
            margin: 0.3125em 0;
            word-break: break-word;
        }

        .body-name,
        .footer-name {
            font-weight: 400;
        }

        .body-value,
        .footer-value {
            color: rgb(0, 0, 153);
            font-weight: 700;
        }

        .body-text a,
        .footer-text a,
        .body-text-link {
            color: rgb(0, 0, 153);
            text-decoration-line: underline;
            text-decoration-style: dashed;
            text-decoration-color: rgba(0, 0, 153, 0.45);
            text-underline-offset: 0.25em;
        }

        .body-text a:hover,
        .footer-text a:hover,
        .body-text-link:hover {
            text-decoration-style: solid;
        }

        .footer-area {
            flex: 1;
            text-align: center;
            padding: 2.5em 1em;
        }

        @media (max-width: 600px) {
            .search-form-wrapper {
                max-width: 100%;
                padding-top: 0.25em;
            }

            .body-content,
            .footer-content {
                max-width: 100%;
            }

            .search-box-container {
                min-height: 2.5em;
                border-radius: 1.25em;
                box-shadow: 0px 0.125em 0.5em 0px rgba(31, 31, 31, 0.08);
            }

            .search-icon-wrapper {
                padding-right: 0.5em;
                padding-left: 0.5em;
                height: 2.5em;
            }

            .search-icon {
                height: 1em;
                width: 1em;
            }

            .search-input {
                height: 2.5em;
                font-size: 16px;
            }

            .buttons-area {
                height: auto;
                padding: 0.5em 1em;
                max-width: 43em;
                margin: 0 auto;
            }

            .search-button {
                font-size: 0.875em;
                height: 2em;
                min-width: 4em;
                margin: 0.5em 0.25em;
                padding: 0 0.75em;
            }

            .logo-area {
                padding-top: 2.5em;
                min-height: 4em;
            }

            .logo-image {
                max-width: 15em;
            }

            .body-text,
            .footer-text {
                font-size: 0.7em;
                margin: 0.25em 0;
                width: 100%;
            }

            .footer-area {
                padding: 1.5em 1em;
            }
        }
    </style>
</head>

<body>
    <div class="page-container">
        <!-- LOGO 区域 -->
        <div class="main-content-wrapper" role="navigation">
            <div class="logo-area">
                <a href="/" title="返回主页">
                    <picture>
                        <img class="logo-image" alt="GARINASSET" src="./images/logo.png" title="GARINASSET Logo"
                            id="garinasset-logo">
                    </picture>
                </a>
            </div>
        </div>

        <!-- 搜索框 区域 -->
        <div class="main-content-wrapper search-container">
            <form action="./ip.html" method="GET" role="search" class="search-form" id="search-form">
                <div class="search-form-wrapper">
                    <div class="search-box-container">
                        <div class="search-inner">
                            <div class="search-icon-wrapper">
                                <div class="search-icon-container">
                                    <span class="search-icon">
                                        <svg focusable="false" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                                            viewBox="0 0 24 24">
                                            <path
                                                d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z">
                                            </path>
                                        </svg>
                                    </span>
                                </div>
                            </div>
                            <input class="search-input" name="ip" autofocus title="搜索" placeholder="输入 IP 地址"
                                id="search-input" maxlength="2048" role="combobox" rows="1" spellcheck="false" />
                        </div>
                    </div>
                </div>

                <!-- 按钮区域 -->
                <div class="buttons-area">
                    <input class="search-button" value="查询" role="button" tabindex="0" type="submit" />
                </div>
            </form>
        </div>
        <!-- IP 区域 -->
        <div class="main-content-wrapper ip-area">
            <div class="body-content" id="ip-body-content">
                <div class="body-text">
                    <span class="body-name">您的 IP</span>
                </div>
                <div class="body-text">
                    <span class="body-value" id="ip">·</span>
                </div>
            </div>
        </div>
    </div>
    <!-- 地理信息 区域 -->
    <div class="main-content-wrapper geolocation-area">
        <div class="body-content" id="geo-body-content">
            <div class="body-text">
                <span class="body-name">地理信息</span>
            </div>
            <div class="body-text">
                <span class="body-value" id="country">·</span>
            </div>
            <div class="body-text">
                <span class="body-value" id="state">·</span>
            </div>
            <div class="body-text">
                <span class="body-value" id="city">·</span>
            </div>
            <div class="body-text">
                <span class="body-value" id="longitude">·</span>
            </div>
            <div class="body-text">
                <span class="body-value" id="latitude">·</span>
            </div>
        </div>
    </div>
    <!-- ASO 区域 -->
    <div class="main-content-wrapper aso-area">
        <div class="body-content" id="aso-body-content">
            <div class="body-text">
                <span class="body-name">ASO</span>
            </div>
            <div class="body-text">
                <span class="body-value" id="ASO">·</span>
            </div>
        </div>
    </div>
    <!-- 客户端 区域 -->
    <div class="main-content-wrapper client-area">
        <div class="body-content" id="client-body-content">
            <div class="body-text">
                <span class="body-name">您的客户端</span>
            </div>
            <div class="body-text">
                <span class="body-value" id="client">·</span>
            </div>
        </div>
    </div>
    <!-- 附加信息/页脚 区域 -->
    <div class="main-content-wrapper footer-area">
        <div class="footer-content" id="footer-content">
            <div class="footer-text">
                <a href="https://api.garinasset.com/ip/redoc">
                    <span class="footer-name">API : </span><span class="footer-value">免费</span>
                </a>
                <span> | </span>
                <a href="https://db-ip.com/">
                    <span class="footer-name">数据库 : </span><span class="footer-value">DB-IP</span>
                </a>
                <span> | </span>
                <a href="https://garinasset.com">
                    <span class="footer-name">应用 & 接口 : </span><span class="footer-value">嘉林资产</span>
                </a>
            </div>
        </div>
    </div>
    <script>
        // 表单输入验证
        const form = document.getElementById("search-form");
        const input = document.getElementById("search-input");
        const searchBox = document.querySelector(".search-box-container");
        form.addEventListener("submit", function (e) {
            const value = input.value.trim();
            input.value = value;

            // 新的 IP 验证逻辑
            function isValidIpAddress(value) {
                if (!value || typeof value !== "string") return false;

                // IPv4 判断
                const ipv4Parts = value.split(".");
                if (ipv4Parts.length === 4 && ipv4Parts.every(part => {
                    const n = Number(part);
                    return String(n) === part && n >= 0 && n <= 255;
                })) {
                    return true;
                }

                // IPv6 判断，利用 URL 构造器
                try {
                    new URL("http://[" + value + "]/");
                    return true;
                } catch (e) {
                    return false;
                }
            }

            if (!isValidIpAddress(value)) {
                e.preventDefault();
                searchBox.classList.add("error");
                searchBox.classList.remove("shake");
                void searchBox.offsetWidth;
                searchBox.classList.add("shake");
                const oldInputValue = input.value;
                input.value = "";
                input.placeholder = "输入 IP 地址";
                setTimeout(() => { input.value = oldInputValue; }, 600);
            } else {
                searchBox.classList.remove("error");
            }
        });
        input.addEventListener("input", function () {
            searchBox.classList.remove("error");
        });
        // 国家代码转 emoji 国旗
        function countryCodeToFlag(code) {
            if (!code || code.length !== 2) return "";
            const first = code.charCodeAt(0) - 65 + 0x1F1E6;
            const second = code.charCodeAt(1) - 65 + 0x1F1E6;
            return String.fromCodePoint(first, second);
        }
        // 十进制度数转度分秒格式
        function toDMS(deg, type) {
            if (deg === null || deg === undefined) return "";
            const absolute = Math.abs(deg);
            const d = Math.floor(absolute);
            const minutesFloat = (absolute - d) * 60;
            const m = Math.floor(minutesFloat);
            const s = ((minutesFloat - m) * 60).toFixed(2);
            let direction = "";
            if (type === "lat") direction = deg >= 0 ? "N" : "S";
            else if (type === "lon") direction = deg >= 0 ? "E" : "W";
            return `${d}°${m}′${s}″${direction}`;
        }
        // 点点动画
        function startDotAnimation(ids) {
            const states = ["·", "··", "···"];
            const elements = ids.map(id => document.getElementById(id));
            const interval = setInterval(() => {
                const n = Math.floor(Math.random() * 3) + 1;
                const state = states[n - 1];
                elements.forEach(el => { if (el) el.innerText = state; });
            }, 400);
            return () => clearInterval(interval);
        }
        // 统一赋值函数
        function updateCell(id, value) {
            const el = document.getElementById(id);
            if (el) el.innerText = value || "None";
        }
        // 动画字段ID
        const animatedIds = [
            "ip", "country", "state", "city", "longitude", "latitude", "ASO", "client"
        ];
        const stopDotAnimation = startDotAnimation(animatedIds);
        // 获取客户端 IP 和地理信息并填充页面
        fetch('https://api.garinasset.com/ip/client')
            .then(r => r.json())
            .then(data => {
                stopDotAnimation();
                // IP 地址为超链接
                const ipEl = document.getElementById("ip");
                if (data.ip && ipEl) {
                    ipEl.innerHTML = `<a href="./ip.html?ip=${data.ip}" class="body-text-link">${data.ip}</a>`;
                } else if (ipEl) {
                    ipEl.innerText = "";
                }
                // 国家/地区 emoji+代码
                updateCell("country", data.country ? countryCodeToFlag(data.country) + " " + data.country : "None");
                updateCell("state", data.state);
                updateCell("city", data.city);
                updateCell("longitude", data.longitude ? toDMS(data.longitude, "lon") : "None");
                updateCell("latitude", data.latitude ? toDMS(data.latitude, "lat") : "None");
                updateCell("ASO", data.ASO);
                updateCell("client", data.user_agent);
            })
            .catch(() => {
                stopDotAnimation();
                ["ip", "client", "country", "state", "city", "longitude", "latitude", "ASO"].forEach(id => {
                    updateCell(id, "获取失败");
                });
            });
    </script>
</body>

</html>
