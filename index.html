        /* 页面容器和基础布局 */

        .search-inner {

        .search-icon-wrapper {
            display: flex;
            align-items: center;
            padding-right: 0.8125em;
            padding-left: 0.875em;

        .search-icon-container {

        @keyframes shake {
            0% {

            20% {

            }

            40% {

            }

            .search-button {
                font-size: 0.875em;

            }

            .logo-area {

            }

            }
        }
    </style>

    <script>
        // 表单输入验证
        const form = document.getElementById("search-form");
        const input = document.getElementById("search-input");
        const searchBox = document.querySelector(".search-box-container");
        form.addEventListener("submit", function (e) {
            const value = input.value.trim();
            input.value = value;

            // 新的 IP 验证逻辑
            function isValidIpAddress(value) {
                if (!value || typeof value !== "string") return false;

                // IPv4 判断
                const ipv4Parts = value.split(".");
                if (ipv4Parts.length === 4 && ipv4Parts.every(part => {
                    const n = Number(part);
                    return String(n) === part && n >= 0 && n <= 255;
                })) {
                    return true;
                }

                // IPv6 判断，利用 URL 构造器
                try {
                    new URL("http://[" + value + "]/");
                    return true;
                } catch (e) {
                    return false;
                }
            }


            // 根据 IANA Special-Purpose Address Registry 与相关 RFC 判断 IP 类型
            // 主要依据：RFC1918, RFC6598, RFC3927, RFC5735/RFC6890, RFC1112, RFC1122,
            // RFC4291, RFC4193, RFC3849 等
            function getIpSpecialType(ip) {
                // IPv4
                if (ip.includes(".")) {
                    const p = ip.split(".").map(Number);
                    const [a, b, c, d] = p;

                    // 255.255.255.255 Broadcast — RFC919
                    if (a === 255 && b === 255 && c === 255 && d === 255)
                        return "IPv4 Broadcast 地址 (RFC919)";

                    // 255.X.X.X
                    if (a === 255)
                        return "IPv4 E类保留地址 (IANA)";

                    // 0.0.0.0/8 — RFC1122
                    if (a === 0)
                        return "IPv4 未指定地址范围 0.0.0.0/8 (RFC1122)";

                    // 10.0.0.0/8 — RFC1918
                    if (a === 10)
                        return "私有 IPv4 地址 10.0.0.0/8 (RFC1918)";

                    // 172.16.0.0/12 — RFC1918
                    if (a === 172 && b >= 16 && b <= 31)
                        return "私有 IPv4 地址 172.16.0.0/12 (RFC1918)";

                    // 192.168.0.0/16 — RFC1918
                    if (a === 192 && b === 168)
                        return "私有 IPv4 地址 192.168.0.0/16 (RFC1918)";

                    // 100.64.0.0/10 — RFC6598
                    if (a === 100 && b >= 64 && b <= 127)
                        return "运营商级 NAT 地址 100.64.0.0/10 (RFC6598)";

                    // 127.0.0.0/8 Loopback — RFC1122
                    if (a === 127)
                        return "IPv4 回环地址 127.0.0.0/8 (RFC1122)";

                    // 169.254.0.0/16 Link Local — RFC3927
                    if (a === 169 && b === 254)
                        return "IPv4 Link‑Local 地址 169.254.0.0/16 (RFC3927)";

                    // 224.0.0.0/4 Multicast — RFC1112
                    if (a >= 224 && a <= 239)
                        return "IPv4 Multicast 地址 224.0.0.0/4 (RFC1112)";

                    // 192.0.2.0/24 TEST-NET — RFC5737
                    if (a === 192 && b === 0 && c === 2)
                        return "IPv4 文档示例地址 192.0.2.0/24 (RFC5737)";

                    // 198.51.100.0/24 TEST-NET — RFC5737
                    if (a === 198 && b === 51 && c === 100)
                        return "IPv4 文档示例地址 198.51.100.0/24 (RFC5737)";

                    // 203.0.113.0/24 TEST-NET — RFC5737
                    if (a === 203 && b === 0 && c === 113)
                        return "IPv4 文档示例地址 203.0.113.0/24 (RFC5737)";

                    // 240.0.0.0/4 Reserved — RFC6890
                    if (a >= 240 && a <= 254)
                        return "IPv4 保留地址 240.0.0.0/4 (RFC6890)";

                    return null;
                }

                // IPv6
                if (ip.includes(":")) {
                    const lower = ip.toLowerCase();

                    // ::1 Loopback — RFC4291
                    if (lower === "::1")
                        return "IPv6 回环地址 ::1 (RFC4291)";

                    // :: Unspecified — RFC4291
                    if (lower === "::")
                        return "IPv6 未指定地址 :: (RFC4291)";

                    // fc00::/7 Unique Local Address — RFC4193
                    if (lower.startsWith("fc") || lower.startsWith("fd"))
                        return "IPv6 私有地址 fc00::/7 (RFC4193)";

                    // fe80::/10 Link Local — RFC4291
                    if (lower.startsWith("fe8") || lower.startsWith("fe9") || lower.startsWith("fea") || lower.startsWith("feb"))
                        return "IPv6 Link‑Local 地址 fe80::/10 (RFC4291)";

                    // ff00::/8 Multicast — RFC4291
                    if (lower.startsWith("ff"))
                        return "IPv6 Multicast 地址 ff00::/8 (RFC4291)";

                    // 2001:db8::/32 Documentation — RFC3849
                    if (lower.startsWith("2001:db8"))
                        return "IPv6 文档示例地址 2001:db8::/32 (RFC3849)";

                    return null;
                }

                return null;
            }

            if (!isValidIpAddress(value)) {
                e.preventDefault();
                searchBox.classList.add("error");
                searchBox.classList.remove("shake");
                void searchBox.offsetWidth;
                searchBox.classList.add("shake");
                const oldInputValue = input.value;
                input.value = "";
                input.placeholder = "输入 IP 地址";
                setTimeout(() => { input.value = oldInputValue; }, 600);
            } else {
                // 判断是否为私有或特殊地址
                const specialType = getIpSpecialType(value);
                if (specialType) {
                    e.preventDefault();
                    searchBox.classList.add("error");
                    searchBox.classList.remove("shake");
                    void searchBox.offsetWidth;
                    searchBox.classList.add("shake");
                    const oldInputValue = input.value;
                    input.value = "";
                    input.placeholder = specialType;
                    setTimeout(() => { input.value = oldInputValue; }, 600);
                } else {
                    searchBox.classList.remove("error");
                }
            }

        });
        input.addEventListener("input", function () {
            searchBox.classList.remove("error");
            input.placeholder = "输入 IP 地址";
        });
        // 国家代码转 emoji 国旗
        function countryCodeToFlag(code) {
            if (!code || code.length !== 2) return "";
            const first = code.charCodeAt(0) - 65 + 0x1F1E6;
            const second = code.charCodeAt(1) - 65 + 0x1F1E6;
            return String.fromCodePoint(first, second);
        }
        // 十进制度数转度分秒格式
        function toDMS(deg, type) {
            if (deg === null || deg === undefined) return "";
            const absolute = Math.abs(deg);
            const d = Math.floor(absolute);
            const minutesFloat = (absolute - d) * 60;
            const m = Math.floor(minutesFloat);
            const s = ((minutesFloat - m) * 60).toFixed(2);
            let direction = "";
            if (type === "lat") direction = deg >= 0 ? "N" : "S";
            else if (type === "lon") direction = deg >= 0 ? "E" : "W";
            return `${d}°${m}′${s}″${direction}`;
        }
        // 点点动画
        function startDotAnimation(ids) {
            const states = ["·", "··", "···"];
            const elements = ids.map(id => document.getElementById(id));
            const interval = setInterval(() => {
                const n = Math.floor(Math.random() * 3) + 1;
                const state = states[n - 1];
                elements.forEach(el => { if (el) el.innerText = state; });
            }, 350);
            return () => clearInterval(interval);
        }
        // 统一赋值函数
        function updateCell(id, value) {
            const el = document.getElementById(id);
            if (el) el.innerText = value || "None";
        }
        // 动画字段ID
        const animatedIds = [
            "ip", "country", "state", "city", "longitude", "latitude", "ISP", "ASO", "client"
        ];
        async function fetchWithNetworkRetrySimple(url, maxRetries = 3, timeout = 5000) {
            let lastError;

            for (let i = 0; i < maxRetries; i++) {
                try {
                    // 超时控制
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), timeout);

                    // 简单 GET 请求，避免自定义 header 触发 CORS 预检
                    const response = await fetch(url, {
                        method: 'GET',
                        signal: controller.signal,
                        cache: 'no-store', // 禁用缓存
                    });

                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    // 返回 JSON 数据
                    return await response.json();

                } catch (error) {
                    lastError = error;

                    if (error.name === 'AbortError') {
                        console.warn(`Attempt ${i + 1} timed out`);
                    } else {
                        console.warn(`Attempt ${i + 1} failed:`, error);
                    }

                    if (i < maxRetries - 1) {
                        // 指数退避
                        await new Promise(res => setTimeout(res, Math.pow(2, i) * 500));
                    }
                }
            }

            throw lastError;
        }
        const stopDotAnimation = startDotAnimation(animatedIds);
        // 获取客户端 IP 和地理信息并填充页面
        fetchWithNetworkRetrySimple('https://api.garinasset.com/ip/client')
            .then(data => {
                stopDotAnimation();
                // IP 地址为超链接
                const ipEl = document.getElementById("ip");
                if (data.ip && ipEl) {
                    ipEl.innerHTML = `<a href="./ip.html?ip=${data.ip}" class="body-text-link">${data.ip}</a>`;
                } else if (ipEl) {
                    ipEl.innerText = "";
                }
                // 国家/地区 emoji+代码
                updateCell("country", data.country ? countryCodeToFlag(data.country) + " " + data.country : "None");
                updateCell("state", data.state ?? "None");
                updateCell("city", data.city ?? "None");
                updateCell("longitude", data.longitude ? toDMS(data.longitude, "lon") : "None");
                updateCell("latitude", data.latitude ? toDMS(data.latitude, "lat") : "None");
                updateCell("ISP", data.ISP ?? "None");
                updateCell("ASO", data.ASO ?? "None");
                updateCell("client", data.user_agent ?? "None");
            })
            .catch(() => {
                stopDotAnimation();
                ["ip", "client", "country", "state", "city", "longitude", "latitude", "ISP", "ASO"].forEach(id => {
                    updateCell(id, "获取失败");
                });
            });
    </script>
