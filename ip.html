  <script>
    // 点点动画
    function startDotAnimation(ids) {
      const states = ["·", "··", "···"];
      const elements = ids.map(id => document.getElementById(id));
      const interval = setInterval(() => {
        const n = Math.floor(Math.random() * 3) + 1;
        const state = states[n - 1];
        elements.forEach(el => { if (el) el.innerText = state; });
      }, 350);
      return () => clearInterval(interval);
    }
    function autoResizeTextarea(textarea) {
      textarea.style.height = "auto";
      textarea.style.height = textarea.scrollHeight + "px";
    }

    function countryCodeToFlag(code) {
      if (!code || code.length !== 2) return "";
      const first = code.charCodeAt(0) - 65 + 0x1f1e6;
      const second = code.charCodeAt(1) - 65 + 0x1f1e6;
      return String.fromCodePoint(first, second);
    }

    function isValidIpAddress(value) {
      if (!value || typeof value !== "string") return false;

      // IPv4 判断
      const ipv4Parts = value.split(".");
      if (ipv4Parts.length === 4 && ipv4Parts.every(part => {
        const n = Number(part);
        return String(n) === part && n >= 0 && n <= 255;
      })) {
        return true;
      }

      // IPv6 判断，利用 URL 构造器
      try {
        // URL 要用 [ ] 包裹 IPv6 地址
        new URL("http://[" + value + "]/");
        return true;
      } catch (e) {
        return false;
      }
    }

    // 根据 IANA Special-Purpose Address Registry 与相关 RFC 判断 IP 类型
    // 主要依据：RFC1918, RFC6598, RFC3927, RFC5735/RFC6890, RFC1112, RFC1122,
    // RFC4291, RFC4193, RFC3849 等
    function getIpSpecialType(ip) {
      // IPv4
      if (ip.includes(".")) {
        const p = ip.split(".").map(Number);
        const [a, b, c, d] = p;

        // 255.255.255.255 Broadcast — RFC919
        if (a === 255 && b === 255 && c === 255 && d === 255)
          return "IPv4 Broadcast 地址 (RFC919)";

        // 255.X.X.X
        if (a === 255)
          return "IPv4 E类保留地址 (IANA)";

        // 0.0.0.0/8 — RFC1122
        if (a === 0)
          return "IPv4 未指定地址范围 0.0.0.0/8 (RFC1122)";

        // 10.0.0.0/8 — RFC1918
        if (a === 10)
          return "私有 IPv4 地址 10.0.0.0/8 (RFC1918)";

        // 172.16.0.0/12 — RFC1918
        if (a === 172 && b >= 16 && b <= 31)
          return "私有 IPv4 地址 172.16.0.0/12 (RFC1918)";

        // 192.168.0.0/16 — RFC1918
        if (a === 192 && b === 168)
          return "私有 IPv4 地址 192.168.0.0/16 (RFC1918)";

        // 100.64.0.0/10 — RFC6598
        if (a === 100 && b >= 64 && b <= 127)
          return "运营商级 NAT 地址 100.64.0.0/10 (RFC6598)";

        // 127.0.0.0/8 Loopback — RFC1122
        if (a === 127)
          return "IPv4 回环地址 127.0.0.0/8 (RFC1122)";

        // 169.254.0.0/16 Link Local — RFC3927
        if (a === 169 && b === 254)
          return "IPv4 Link‑Local 地址 169.254.0.0/16 (RFC3927)";

        // 224.0.0.0/4 Multicast — RFC1112
        if (a >= 224 && a <= 239)
          return "IPv4 Multicast 地址 224.0.0.0/4 (RFC1112)";

        // 192.0.2.0/24 TEST-NET — RFC5737
        if (a === 192 && b === 0 && c === 2)
          return "IPv4 文档示例地址 192.0.2.0/24 (RFC5737)";

        // 198.51.100.0/24 TEST-NET — RFC5737
        if (a === 198 && b === 51 && c === 100)
          return "IPv4 文档示例地址 198.51.100.0/24 (RFC5737)";

        // 203.0.113.0/24 TEST-NET — RFC5737
        if (a === 203 && b === 0 && c === 113)
          return "IPv4 文档示例地址 203.0.113.0/24 (RFC5737)";

        // 240.0.0.0/4 Reserved — RFC6890
        if (a >= 240 && a <= 254)
          return "IPv4 保留地址 240.0.0.0/4 (RFC6890)";

        return null;
      }

      // IPv6
      if (ip.includes(":")) {
        const lower = ip.toLowerCase();

        // ::1 Loopback — RFC4291
        if (lower === "::1")
          return "IPv6 回环地址 ::1 (RFC4291)";

        // :: Unspecified — RFC4291
        if (lower === "::")
          return "IPv6 未指定地址 :: (RFC4291)";

        // fc00::/7 Unique Local Address — RFC4193
        if (lower.startsWith("fc") || lower.startsWith("fd"))
          return "IPv6 私有地址 fc00::/7 (RFC4193)";

        // fe80::/10 Link Local — RFC4291
        if (lower.startsWith("fe8") || lower.startsWith("fe9") || lower.startsWith("fea") || lower.startsWith("feb"))
          return "IPv6 Link‑Local 地址 fe80::/10 (RFC4291)";

        // ff00::/8 Multicast — RFC4291
        if (lower.startsWith("ff"))
          return "IPv6 Multicast 地址 ff00::/8 (RFC4291)";

        // 2001:db8::/32 Documentation — RFC3849
        if (lower.startsWith("2001:db8"))
          return "IPv6 文档示例地址 2001:db8::/32 (RFC3849)";

        return null;
      }

      return null;
    }
    async function fetchWithNetworkRetrySimple(url, maxRetries = 3, timeout = 5000) {
      let lastError;

      for (let i = 0; i < maxRetries; i++) {
        try {
          // 超时控制
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), timeout);

          // 简单 GET 请求，避免自定义 header 触发 CORS 预检
          const response = await fetch(url, {
            method: 'GET',
            signal: controller.signal,
            cache: 'no-store', // 禁用缓存
          });

          clearTimeout(timeoutId);

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          // 返回 JSON 数据
          return await response.json();

        } catch (error) {
          lastError = error;

          if (error.name === 'AbortError') {
            console.warn(`Attempt ${i + 1} timed out`);
          } else {
            console.warn(`Attempt ${i + 1} failed:`, error);
          }

          if (i < maxRetries - 1) {
            // 指数退避
            await new Promise(res => setTimeout(res, Math.pow(2, i) * 500));
          }
        }
      }

      throw lastError;
    }
    // 辅助函数：简化赋值
    function updateCell(id, value, isHTML) {

      if (cell) {

    // 统一的查询和填充逻辑
    function fetchAndFill(ip, doms) {
      const {
        input,
        table,
        apiTryout,
        apiText,
        responseContentLink,
        responseContent,
        responseContentInput,
        error
      } = doms;

      error.style.display = "none";
      responseContent.style.display = "block";
      responseContentInput.value = "";

      // 立即显示基础信息（无需等待接口）
      table.style.display = "";
      apiTryout.style.display = "";
      updateCell("cell-ip", ip);

      // 点点动画
      const dotIds = [
        "cell-country",
        "cell-region",
        "cell-city",
        "cell-longitude",
        "cell-latitude",
        "cell-ISP",
        "cell-ASN",
        "cell-ASO"
      ];
      const stopDotAnimation = startDotAnimation(dotIds);

      // 试试接口内容无需等待
      const apiUrl = "https://api.garinasset.com/ip/" + ip;
      apiText.value = "curl " + apiUrl;
      autoResizeTextarea(apiText);

      fetchWithNetworkRetrySimple(apiUrl)
        .then((data) => {
          const apiUrl2 = "https://api.garinasset.com/ip/" + (data.ip ?? ip);
          error.style.display = "none";
          apiText.value = "curl " + apiUrl2;
          responseContentLink.href = apiUrl2;
          autoResizeTextarea(apiText);
          responseContentInput.value = JSON.stringify(data, null, 2);
          responseContent.style.display = "block";
          autoResizeTextarea(responseContentInput);
          input.value = ip;
          // 填充结果
          updateCell("cell-ip", data.ip ?? "None");
          updateCell(
            "cell-country",
            data.country
              ? countryCodeToFlag(data.country.toUpperCase()) + " " + data.country.toUpperCase()
              : "None"
          );
          updateCell("cell-region", data.region ?? "None");
          updateCell("cell-city", data.city ?? "None");
          updateCell("cell-longitude", data.longitude != null ? data.longitude : "None");
          updateCell("cell-latitude", data.latitude != null ? data.latitude : "None");
          updateCell("cell-ISP", data.ISP ?? "None");
          updateCell("cell-ASN", data.ASN ?? "None");
          updateCell("cell-ASO", data.ASO ?? "None");
        })
        .catch(() => {
          responseContentInput.value = "";
          error.textContent = "未收到服务器的 正确 响应, 请您检查网络连接或尝试刷新页面重试。";
          error.style.display = "";
        })
        .finally(() => { stopDotAnimation(); });
    }

    // 搜索表单提交（防止页面刷新，动态加载结果，保持输入内容）
    (function () {
      const form = document.getElementById("search-form");
      const input = document.getElementById("ip-input");
      const table = document.getElementById("ip-table");
      const apiTryout = document.getElementById("api-tryout");
      const apiText = document.getElementById("api-tryout-input");
      const responseContentLink = document.getElementById("response-content-link");
      const responseContent = document.getElementById("response-content");
      const responseContentInput = document.getElementById("response-content-input");
      const error = document.getElementById("error-msg");

      const doms = {
        input,
        table,
        apiTryout,
        apiText,
        responseContentLink,
        responseContent,
        responseContentInput,
        error
      };

      let currentIp = null;

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        const value = input.value.trim();
        input.value = value;

        if (!isValidIpAddress(value)) {
          form.classList.add("error");

          form.classList.remove("shake");
          void form.offsetWidth;
          form.classList.add("shake");

          const oldInputValue = input.value;
          input.value = "";
          input.placeholder = "输入 IP 地址";

          setTimeout(() => {
            input.value = oldInputValue;
          }, 600);

          return;
        }

        // 判断是否为私有或特殊地址
        const specialType = getIpSpecialType(value);
        if (specialType) {
          form.classList.add("error");

          form.classList.remove("shake");
          void form.offsetWidth;
          form.classList.add("shake");

          const oldInputValue = input.value;
          input.value = "";
          input.placeholder = specialType;

          setTimeout(() => {
            input.value = oldInputValue;
          }, 600);
          return;
        }

        form.classList.remove("error");

        // 在移动端点击键盘“搜索”后收起键盘
        input.blur();

        history.replaceState(null, "", "?ip=" + encodeURIComponent(value));
        currentIp = value;
        fetchAndFill(value, doms);
      });
      input.addEventListener("input", function () {
        // 用户重新输入时立即清除错误和动画状态
        form.classList.remove("error", "shake");
        input.placeholder = "输入 IP 地址";
      });

      // 在获得焦点时如果已有内容则自动全选（只执行一次），避免每次点击都被重新全选
      input.addEventListener("focus", function () {
        if (this.value && !this.dataset.autoSelected) {
          this.dataset.autoSelected = "1";
          setTimeout(() => {
            this.select();
          }, 0);
        }
      });

      // 失去焦点时重置状态，下次重新进入输入框仍然可以自动全选
      input.addEventListener("blur", function () {
        delete this.dataset.autoSelected;
      });

      // 页面带有ip参数则自动查询
      const params = new URLSearchParams(window.location.search);
      const ip = params.get("ip");

      // 如果没有 IP 参数，则查询用户自身 IP
      if (!ip) {
        fetch("https://api.garinasset.com/ip/")
          .then(r => r.text())
          .then(userIp => {
            const value = userIp.trim();
            if (!isValidIpAddress(value)) {
              error.textContent = "已获取到您的 IP 地址, 但是却发现它不是有效的 IP 地址";
              error.style.display = "";
              return;
            }
            input.value = value;

            // 更新 URL 为 ?ip=xxx，方便分享与刷新
            // history.replaceState(null, "", "?ip=" + encodeURIComponent(value));

            currentIp = value;
            fetchAndFill(value, doms);
          })
          .catch(() => {
            error.textContent = "在本次请求中, 未能通过 API 获取您的 IP 地址";
            error.style.display = "";
          });
        return;
      }

      input.value = ip;
      error.style.display = "none";

      // URL 参数也进行一次 IP 合法性校验
      if (!isValidIpAddress(ip)) {
        form.classList.add("error");
        error.textContent = "URL 中的 IP 地址不是有效 IP 地址";
        error.style.display = "";
        return;
      }

      currentIp = ip;
      fetchAndFill(ip, doms);
    })();
  </script>
</body>

</html>
